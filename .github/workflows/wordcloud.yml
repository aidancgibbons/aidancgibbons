name: Update Word Cloud

on:
  issues:
    types: [opened]
  workflow_dispatch:
  push:
    paths:
      - "data/words.json"
      - "scripts/generate_wordcloud.py"

permissions:
  contents: write
  issues: write

jobs:
  update:
    if: github.event_name != 'issues' || contains(github.event.issue.labels.*.name, 'word-cloud')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse new word from issue
        if: github.event_name == 'issues'
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const match =
              body.match(/###\s*Your word\s*\r?\n+([\s\S]*?)(?:\r?\n###|$)/i) ||
              body.match(/Your word\s*\r?\n+([\s\S]*?)(?:\r?\n|$)/i);
            const word = (match?.[1] || "").trim().split(/\s+/)[0];
            if (!word || word.length > 40) {
              core.setFailed("Could not parse a valid word from the issue.");
              return;
            }
            core.setOutput("word", word);

      - name: Append word to words.json
        if: github.event_name == 'issues'
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path

          word = os.environ["WORD"].strip()
          path = Path("data/words.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          words = data.setdefault("words", [])
          if word.lower() not in {w.lower() for w in words}:
              words.append(word)
          path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          WORD: ${{ steps.parse.outputs.word }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate word cloud
        run: python scripts/generate_wordcloud.py

      - name: Update stats
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path

          words = json.loads(Path("data/words.json").read_text(encoding="utf-8"))["words"]
          stats_path = Path("data/stats.json")
          stats = json.loads(stats_path.read_text(encoding="utf-8"))
          stats["count"] = len(words)
          stats["clouds"] = stats.get("clouds", 0) + 1
          if os.environ.get("EVENT_NAME") == "issues":
              stats["participants"] = stats.get("participants", 0) + 1
          stats_path.write_text(json.dumps(stats, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/wordcloud.png data/words.json data/stats.json
          git diff --staged --quiet || git commit -m "chore: update community word cloud"
          git push

      - name: Close issue with thanks
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "Thanks! Your word was added and the cloud was regenerated. ☁️✨"
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: "closed"
            });
